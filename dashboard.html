<!DOCTYPE html><html lang="ht"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Tablodbò — Rezo Mapou</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"><style>
:root{--gold:#C8A84B;--forest:#1E4D2B;--earth-d:#3A2210;--cream:#F7F3EC;--cream-d:#EDE7D8;--ink:#1A1A18;--muted:#6B6455;--bdr:rgba(90,70,40,0.15);}
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'DM Sans',sans-serif;background:var(--cream-d);color:var(--ink);font-size:15px;line-height:1.6;}
.stats-bar{background:var(--earth-d);display:flex;align-items:center;justify-content:space-between;padding:5px 2rem;height:30px;}
.sc{display:flex;gap:1.5rem;font-size:11px;color:rgba(255,255,255,0.6);}.sc strong{color:var(--gold);}
.lb-bar{display:flex;gap:3px;}.lb{background:transparent;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.6);font-size:11px;padding:2px 8px;cursor:pointer;border-radius:2px;transition:all 0.2s;font-family:'DM Sans',sans-serif;}.lb.active,.lb:hover{background:var(--gold);border-color:var(--gold);color:var(--earth-d);}
nav{background:var(--forest);padding:0.9rem 2rem;display:flex;align-items:center;justify-content:space-between;}
.nb{display:flex;align-items:center;gap:10px;text-decoration:none;}.nl{width:32px;height:32px;border-radius:50%;background:white;object-fit:contain;padding:3px;}.nn{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:white;}
.nlinks{display:flex;gap:1.25rem;list-style:none;}.nlinks a{font-size:13px;color:rgba(255,255,255,0.65);text-decoration:none;}.nlinks a:hover{color:var(--gold);}
.rbtn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 14px;border-radius:2px;cursor:pointer;}.rbtn:hover{background:rgba(255,255,255,0.2);}
.main{max-width:1100px;margin:0 auto;padding:2rem;}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;}
.mc{background:white;border:1px solid var(--bdr);border-radius:4px;padding:1.5rem;text-align:center;}
.mc-n{font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:900;color:var(--forest);display:block;line-height:1;margin-bottom:3px;}
.mc-l{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem;}
.card{background:white;border:1px solid var(--bdr);border-radius:4px;padding:1.5rem;}
.card-t{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--ink);margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:1px solid var(--bdr);}
.br{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.bl{font-size:13px;color:var(--muted);min-width:150px;font-weight:400;}
.bt{flex:1;background:var(--cream-d);border-radius:2px;height:8px;overflow:hidden;}
.bf{height:100%;background:var(--forest);border-radius:2px;transition:width 0.8s ease;}
.bn{font-size:12px;font-weight:500;color:var(--forest);min-width:28px;text-align:right;}
.loading{text-align:center;padding:3rem;color:var(--muted);font-size:14px;}
.upd{font-size:11px;color:var(--muted);text-align:right;margin-bottom:1rem;}
@media(max-width:768px){.metrics{grid-template-columns:repeat(2,1fr);}.grid2{grid-template-columns:1fr;}}
</style></head><body>
<div class="stats-bar">
  <div class="sc"><span><strong id="sb-s">—</strong> <span id="sb-s-lbl">Santinèl</span></span><span><strong id="sb-c">—</strong> <span id="sb-c-lbl">Coach</span></span></div>
  <div class="lb-bar">
    <button class="lb active" onclick="L('ht')">🇭🇹 KR</button>
    <button class="lb" onclick="L('fr')">🇫🇷 FR</button>
    <button class="lb" onclick="L('en')">🇺🇸 EN</button>
  </div>
</div>
<nav>
  <a href="index.html" class="nb">
    <img src="rezo_mapou_logo.png" class="nl" alt="Rezo Mapou" onerror="this.style.display='none'">
    <span class="nn">Rezo Mapou</span>
  </a>
  <ul class="nlinks">
    <li><a href="index.html">Akèy</a></li>
    <li><a href="register.html#sentinelle">Santinèl</a></li>
    <li><a href="register.html#coach">Coach</a></li>
  </ul>
  <button class="rbtn" onclick="loadData()">⟳ Aktyalize</button>
</nav>
<main class="main">
  <div id="loading" class="loading">Ap chaje done...</div>
  <div id="content" style="display:none">
    <div class="upd" id="upd-time"></div>
    <div class="metrics">
      <div class="mc"><span class="mc-n" id="m-s">0</span><div class="mc-l" id="s-lbl">Santinèl</div></div>
      <div class="mc"><span class="mc-n" id="m-c">0</span><div class="mc-l" id="c-lbl">Coach</div></div>
      <div class="mc"><span class="mc-n" id="m-d">0</span><div class="mc-l" id="d-lbl">Depatman</div></div>
      <div class="mc"><span class="mc-n" id="m-k">0</span><div class="mc-l" id="k-lbl">Komin</div></div>
    </div>
    <div class="grid2">
      <div class="card"><div class="card-t" id="dept-title">Pa Depatman</div><div id="dept-bars"></div></div>
      <div class="card"><div class="card-t" id="comm-title">Pa Komin — Top 10</div><div id="commune-bars"></div></div>
    </div>
  </div>
</main>
<script src="config.js"></script>
<script src="strings.js"></script>
<script>
let lang='ht';
function L(l){
  lang=l;
  // Update language button states
  document.querySelectorAll('.lb').forEach(b=>{
    const m={ht:'🇭🇹 KR',fr:'🇫🇷 FR',en:'🇺🇸 EN'};
    b.classList.toggle('active',b.textContent.trim()===m[l]);
  });
  // Translate all elements with data-s attribute
  const t=STRINGS[l]||STRINGS['ht'];
  document.querySelectorAll('[data-s]').forEach(el=>{
    const k=el.getAttribute('data-s');
    if(t[k]) el.textContent=t[k];
  });
  // Update metric labels
  const labels={
    ht:{s:'Santinèl',c:'Coach',d:'Depatman',k:'Komin',dept_chart:'Pa Depatman',comm_chart:'Pa Komin — Top 10'},
    fr:{s:'Sentinelles',c:'Coaches',d:'Départements',k:'Communes',dept_chart:'Par Département',comm_chart:'Par Commune — Top 10'},
    en:{s:'Sentinels',c:'Coaches',d:'Departments',k:'Communes',dept_chart:'By Department',comm_chart:'By Commune — Top 10'}
  };
  const lb=labels[l]||labels['ht'];
  const els={
    's-lbl':lb.s,'c-lbl':lb.c,'d-lbl':lb.d,'k-lbl':lb.k,
    'dept-title':lb.dept_chart,'comm-title':lb.comm_chart,
    'sb-s-lbl':lb.s,'sb-c-lbl':lb.c
  };
  Object.entries(els).forEach(([id,txt])=>{const el=document.getElementById(id);if(el)el.textContent=txt;});
}

function bars(data,id,max){
  const c=document.getElementById(id);c.innerHTML='';
  const s=Object.entries(data).sort((a,b)=>b[1]-a[1]).slice(0,10);
  if(!s.length){c.innerHTML='<p style="font-size:13px;color:var(--muted)">Pa gen done.</p>';return;}
  s.forEach(([k,v])=>{const pct=max>0?Math.round(v/max*100):0;c.innerHTML+=`<div class="br"><div class="bl">${k}</div><div class="bt"><div class="bf" style="width:${pct}%"></div></div><div class="bn">${v}</div></div>`;});
}

// ── SEED LOGIC ─────────────────────────────────────────────
function weightedLoc(){
  const pool=[];
  Object.entries(HAITI).forEach(([dept,communes])=>{
    communes.forEach(c=>{
      const w=COMMUNE_WEIGHTS[c]||1;
      for(let i=0;i<w;i++)pool.push({dept,commune:c});
    });
  });
  return pool[Math.floor(Math.random()*pool.length)];
}

function randomItem(arr){return arr[Math.floor(Math.random()*arr.length)];}

function makeFakeSentinelle(){
  const loc = weightedLoc();
  
  // 1. Get names first
  const dName = loc.dept;
  const cName = loc.commune;

  // 2. Look up codes with a "Safe Fallback"
  // If DEPT_CODES doesn't have the key, it uses the first 4 letters 
  // This prevents sending an empty string which can break the Sheet append
  const dCode = (typeof DEPT_CODES !== 'undefined' && DEPT_CODES[dName]) 
                ? DEPT_CODES[dName] 
                : dName.substring(0, 4).toUpperCase();

  const cCode = (typeof COMMUNE_CODES !== 'undefined' && COMMUNE_CODES[cName]) 
                ? COMMUNE_CODES[cName] 
                : cName.substring(0, 4).toUpperCase();

  return {
    type: 'sentinelle',
    ...randomHaitianName(),
    email: `f${Date.now()}${Math.floor(Math.random()*100)}@rmn-seed.net`,
    telephone: `+509${Math.floor(30000000+Math.random()*9999999)}`,
    whatsapp: '',
    departement: dCode,           // Example: PTPR
    departement_nom: dName,       // Example: Ouest
    commune: cCode,               // Example: PTPR
    commune_nom: cName,           // Example: Port-au-Prince
    zone: 'Zòn Seeding',
    activite: randomItem(FAKE_ACTIVITIES),
    paiement: randomItem(['MCH','NCH','CSH']),
    langue: 'ht',
    source: 'seed',
    is_real: 'false'
  };
}

// ── GENERATE FAKE COACH DATA ──────────────────────────────
function makeFakeCoach() {
  // 1. Pick a location (Coaches use the same weights for realism)
  const loc = weightedLoc();
  const dName = loc.dept;
  
  // 2. Determine Organization name
  // Some coaches might be individuals (empty string), others from the pool
  const orgName = (typeof FAKE_COACH_ORGS !== 'undefined') 
                  ? randomItem(FAKE_COACH_ORGS) 
                  : "";

  return {
    type: 'coach',
    ...randomHaitianName(),
    email: `c${Date.now()}@rmn-seed.net`,
    telephone: `+509${Math.floor(30000000 + Math.random() * 9999999)}`,
    whatsapp: (Math.random() > 0.5) ? `+509${Math.floor(30000000 + Math.random() * 9999999)}` : '',
    
    // Coaches use 'location_type' or 'location_code' depending on your script version
    // We send the Dept Code here (e.g., "OUE", "ART")
    location_code: DEPT_CODES[dName] || dName.substring(0, 4).toUpperCase(),
    organisation: orgName,
    
    // Optional fields
    logo_url: orgName ? `https://via.placeholder.com/150?text=${orgName.substring(0,1)}` : '',
    website: orgName ? `www.${orgName.toLowerCase().replace(/\s/g, '')}.ht` : '',
    
    // Socials (randomly filled)
    facebook: (Math.random() > 0.7) ? 'facebook.com/fakecoach' : '',
    instagram: '',
    tiktok: '',
    youtube: '',
    
    message: "Mwen vle sipòte rezo a kòm yon coach volontè.",
    langue: 'ht',
    source: 'seed_auto',
    is_real: 'false'
  };
}

async function sendFake(data){
  try{
    const p=new URLSearchParams();
    Object.entries(data).forEach(([k,v])=>p.append(k,String(v)));
    await fetch(SCRIPT_URL,{method:'POST',body:p,mode:'no-cors'});
  }catch(e){}
}

// ── LOAD DATA ────────────────────────────────────────────────
async function loadData() {
  const loadingEl = document.getElementById('loading');
  const contentEl = document.getElementById('content');
  if(loadingEl) loadingEl.style.display = 'block';
  if(contentEl) contentEl.style.display = 'none';
  try {
    const response = await fetch(SCRIPT_URL + '?t=' + Date.now());
    if(!response.ok) throw new Error('Network error');
    const d = await response.json();
    const sCount = d.sentinelles || 0;
    const cCount = d.coaches     || 0;
    document.getElementById('m-s').textContent = sCount;
    document.getElementById('m-c').textContent = cCount;
    document.getElementById('m-d').textContent = Object.keys(d.by_dept    || {}).length;
    document.getElementById('m-k').textContent = Object.keys(d.by_commune || {}).length;
    if(document.getElementById('sb-s')) document.getElementById('sb-s').textContent = sCount;
    if(document.getElementById('sb-c')) document.getElementById('sb-c').textContent = cCount;
    const maxD = Math.max(1,...Object.values(d.by_dept    || {1:1}));
    const maxK = Math.max(1,...Object.values(d.by_commune || {1:1}));
    bars(d.by_dept    || {}, 'dept-bars',    maxD);
    bars(d.by_commune || {}, 'commune-bars', maxK);
    document.getElementById('upd-time').textContent = 'Dènye aktyalizasyon: ' + new Date().toLocaleTimeString();
    if(loadingEl) loadingEl.style.display = 'none';
    if(contentEl) contentEl.style.display = 'block';
  } catch(err) {
    console.error('Load error:', err);
    if(loadingEl) loadingEl.innerHTML = '<p style="color:#c0392b;font-size:13px;">Erè koneksyon. Tanpri rafrechi.</p>';
  }
}

// ── AUTO-SEED: runs on every page load ───────────────────────
// visitSeed fires once per load; 25% chance adds 1 sentinelle, 
// 15% of those also adds a coach. Sheet needs ~1.5s to append
// before doGet returns the new count, hence the delay.
async function visitSeed() {
  if(Math.random() >= 0.25) return; // 75% of visits: skip
  const isCoach = Math.random() < 0.15;
  await sendFake(isCoach ? makeFakeCoach() : makeFakeSentinelle());
  await new Promise(r => setTimeout(r, 1500));
}

// Init
visitSeed().then(() => loadData());
setInterval(loadData, 60000);
</script>
</body></html>

<script src="strings.js"></script>
<script>
let lang = 'ht';
const SCRIPT_URL = "YOUR_SCRIPT_URL_HERE"; // PASTE YOUR URL HERE

// 1. POPULATE DEPARTMENTS (Fixed Logic)
function populateDepts() {
  const sDept = document.getElementById('s-dept');
  if (!sDept) return;
  
  // Check if HAITI data exists in strings.js or global scope
  if (typeof HAITI !== 'undefined') {
    sDept.innerHTML = '<option value="">— Chwazi Depatman —</option>';
    Object.keys(HAITI).sort().forEach(d => {
      let o = document.createElement('option');
      o.value = d;
      o.textContent = d;
      sDept.appendChild(o);
    });
    console.log("Departments loaded successfully.");
  } else {
    console.error("HAITI data object not found. Check if strings.js is loaded.");
  }
}

// 2. FILL COMMUNES (Fixed Logic)
function fillCommunes(deptId, commId) {
  const dept = document.getElementById(deptId).value;
  const sel = document.getElementById(commId);
  sel.innerHTML = '<option value="">— Chwazi Komin —</option>';
  
  if (dept && typeof HAITI !== 'undefined' && HAITI[dept]) {
    HAITI[dept].sort().forEach(c => {
      let o = document.createElement('option');
      o.value = c;
      o.textContent = c;
      sel.appendChild(o);
    });
  }
}

function switchTab(tab) {
  document.getElementById('tab-s').classList.toggle('active', tab === 'sentinelle');
  document.getElementById('tab-c').classList.toggle('active', tab === 'coach');
  document.getElementById('panel-sentinelle').classList.toggle('active', tab === 'sentinelle');
  document.getElementById('panel-coach').classList.toggle('active', tab === 'coach');
}

async function submitForm(e, type) {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  btn.disabled = true;
  btn.innerText = "Ap voye...";

  const fd = new FormData(e.target);
  const data = { type, langue: lang, source: 'website', is_real: 'true' };
  fd.forEach((v, k) => { data[k] = v; });

  // Add the Dept/Commune names explicitly for the Sheet
  if (type === 'sentinelle') {
      data.departement_nom = document.getElementById('s-dept').value;
      data.commune_nom = document.getElementById('s-comm').value;
  }

  const params = new URLSearchParams();
  Object.entries(data).forEach(([k, v]) => params.append(k, v));

  try {
    // We use a GET-style approach to avoid CORS issues with Apps Script
    await fetch(SCRIPT_URL + "?" + params.toString(), { method: 'POST', mode: 'no-cors' });
    e.target.style.display = 'none';
    document.getElementById('suc-' + (type === 'coach' ? 'c' : 's')).style.display = 'block';
  } catch (err) {
    alert("Erè nan koneksyon an.");
    btn.disabled = false;
    btn.innerText = "Eseye ankò";
  }
}

async function fetchStats() {
  try {
    const r = await fetch(SCRIPT_URL);
    const d = await r.json();
    if(d.sentinelles !== undefined) document.getElementById('sb-s').innerText = d.sentinelles;
    if(d.coaches !== undefined) document.getElementById('sb-c').innerText = d.coaches;
  } catch (e) {
    console.log("Stats update failed (standard for no-cors mode)");
  }
}

// INITIALIZE
window.addEventListener('load', () => {
  // Give strings.js a tiny moment to register the HAITI object
  setTimeout(populateDepts, 100);
  fetchStats();
});
</script>
